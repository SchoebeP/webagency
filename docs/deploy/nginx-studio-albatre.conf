# studio-albatre.fr — vhost pour le reverse proxy nginx (conteneur nginx:alpine)
# Backend : conteneur studio-albatre-web-1, publié sur le port HÔTE 3001.
# Depuis le conteneur nginx, le host est joignable via la gateway du bridge
# Docker (172.17.0.1 par défaut) — adapter si le proxy utilise un autre réseau.

upstream studio_albatre {
    server 172.17.0.1:3001;
}

# ---- HTTP : ACME challenge + redirection HTTPS ----
server {
    listen 80;
    server_name studio-albatre.fr www.studio-albatre.fr;

    # Webroot certbot (adapter au volume ACME existant du proxy)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://studio-albatre.fr$request_uri;
    }
}

# ---- HTTPS ----
# Activer ce bloc une fois le certificat émis.
server {
    listen 443 ssl;
    http2 on;
    server_name studio-albatre.fr www.studio-albatre.fr;

    ssl_certificate     /etc/letsencrypt/live/studio-albatre.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio-albatre.fr/privkey.pem;

    # Canonique SEO : www -> apex en 301 (aligné sur site.url et le canonical).
    if ($host = www.studio-albatre.fr) {
        return 301 https://studio-albatre.fr$request_uri;
    }

    location / {
        proxy_pass http://studio_albatre;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Le rate limiter de /api/contact lit le premier hop de X-Forwarded-For.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
