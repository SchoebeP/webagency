name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Matches the Dockerfile base image (node:22-alpine) that production builds on.
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  sites:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [duval-paysage, poulettes-du-bec, rouvier-automobiles]
    defaults:
      run:
        working-directory: sites/${{ matrix.site }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/${{ matrix.site }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
